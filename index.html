<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Sistem Informasi Preloved - QR Code Monitoring Stok</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0a2b5e 0%, #1a3d7c 100%);
            padding: 20px 16px;
            min-height: 100vh;
        }

        .app-container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        header {
            text-align: center;
            margin-bottom: 30px;
            background: linear-gradient(135deg, #0a2b5e 0%, #0d3570 100%);
            border-radius: 32px;
            padding: 24px 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .logo-badge {
            background: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px;
        }

        .logo-badge i {
            font-size: 32px;
            color: #0a2b5e;
        }

        header h1 {
            font-size: 1.8rem;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        header h1 i {
            color: #ffd700;
        }

        .qr-badge {
            background: #ffd700;
            color: #0a2b5e;
            display: inline-block;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 700;
            margin-top: 12px;
        }

        .stripes {
            display: flex;
            justify-content: center;
            gap: 4px;
            margin-top: 16px;
        }

        .stripes span {
            width: 35px;
            height: 4px;
            background: white;
            border-radius: 4px;
        }

        .stripes span:nth-child(even) {
            background: #ffd700;
        }

        /* Card */
        .card {
            background: white;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 24px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        .info-card {
            background: linear-gradient(135deg, #e0e7ff 0%, #dbeafe 100%);
            border-left: 4px solid #ffd700;
        }

        .info-card p {
            color: #1e3a6b;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .filter-card {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            justify-content: space-between;
        }

        .search-box {
            flex: 2;
            min-width: 180px;
            display: flex;
            align-items: center;
            background: #f1f5f9;
            border-radius: 40px;
            padding: 4px 16px;
            gap: 8px;
        }

        .search-box input {
            border: none;
            background: transparent;
            padding: 10px 0;
            width: 100%;
        }

        .filter-group {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .filter-group select {
            padding: 8px 16px;
            background: #f1f5f9;
            border: none;
            border-radius: 30px;
            font-size: 0.8rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, #0a2b5e 0%, #1a3d7c 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .catalog-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin: 8px 8px 20px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 40px;
        }

        .catalog-header h2 {
            color: white;
            font-size: 1.1rem;
        }

        .badge {
            background: #ffd700;
            padding: 4px 12px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 0.75rem;
            color: #0a2b5e;
        }

        /* Grid Katalog */
        .catalog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 24px;
        }

        .item-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            transition: all 0.3s ease;
        }

        .item-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 30px -12px rgba(0,0,0,0.25);
        }

        .item-card.sold-out {
            opacity: 0.7;
            filter: grayscale(0.2);
        }

        .item-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .item-info {
            padding: 16px;
        }

        .item-title {
            font-weight: 800;
            font-size: 1rem;
            color: #0a2b5e;
        }

        .item-cat {
            font-size: 0.7rem;
            font-weight: 600;
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            background: #e0e7ff;
            color: #1e40af;
            margin: 8px 0;
        }

        .item-price {
            font-weight: 800;
            font-size: 1.2rem;
            color: #0a2b5e;
        }

        .item-price::before {
            content: "Rp ";
            font-size: 0.8rem;
        }

        .status-tersedia {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 700;
            background: #dcfce7;
            color: #15803d;
        }

        .status-soldout {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 700;
            background: #9ca3af;
            color: #1f2937;
        }

        /* QR Section */
        .qr-section {
            background: #f8fafc;
            border-radius: 16px;
            padding: 12px;
            margin: 12px 0;
            text-align: center;
            border: 1px dashed #0a2b5e;
        }

        .qr-placeholder {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 110px;
        }

        .btn-qr {
            background: #0a2b5e;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 8px;
        }

        .qr-id-text {
            font-size: 0.6rem;
            color: #64748b;
            margin-top: 6px;
            word-break: break-all;
        }

        .card-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .btn-sold {
            background: #e0e7ff;
            color: #0a2b5e;
            border: none;
            padding: 6px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .btn-delete {
            background: #fef2f2;
            color: #dc2626;
            border: none;
            padding: 6px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* Modal Scan */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            border-radius: 24px;
            padding: 24px;
            max-width: 90%;
            width: 350px;
            text-align: center;
        }

        .modal-content input {
            width: 100%;
            padding: 12px;
            margin: 16px 0;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-size: 0.9rem;
        }

        .btn-close {
            background: #dc2626;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
        }

        footer {
            text-align: center;
            margin-top: 40px;
            padding: 20px;
            background: #0a2b5e;
            border-radius: 24px;
            color: #b8d4ff;
            font-size: 0.75rem;
        }

        @media (max-width: 640px) {
            .catalog-grid {
                grid-template-columns: 1fr;
            }
            .filter-card {
                flex-direction: column;
                align-items: stretch;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header>
            <div class="logo-badge">
                <i class="fas fa-qrcode"></i>
            </div>
            <h1><i class="fas fa-tshirt"></i> Preloved<span style="color:#ffd700">QR</span></h1>
            <div class="qr-badge">
                <i class="fas fa-qrcode"></i> Setiap Barang Punya QR Code Unik
            </div>
            <div class="stripes">
                <span></span><span></span><span></span><span></span><span></span>
            </div>
        </header>

        <!-- Info Card -->
        <div class="card info-card">
            <p>
                <i class="fas fa-qrcode"></i>
                <strong>📌 Cara Monitoring Stok dengan QR Code:</strong>
                <span style="font-size: 0.75rem;">1️⃣ Scan QR Code pakai HP → 2️⃣ Lihat detail barang → 3️⃣ Cek status stok</span>
            </p>
        </div>

        <!-- Form Tambah Barang -->
        <div class="card">
            <h2 style="font-size: 1.1rem; margin-bottom: 16px; color:#0a2b5e;"><i class="fas fa-plus-circle"></i> Tambah Barang Baru</h2>
            <form id="itemForm">
                <div style="display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 12px;">
                    <input type="text" id="nama" placeholder="Nama Barang" required style="flex:2; padding: 10px; border-radius: 12px; border:1px solid #e2e8f0;">
                    <select id="kategori" required style="flex:1; padding: 10px; border-radius: 12px; border:1px solid #e2e8f0;">
                        <option value="">Kategori</option>
                        <option>👔 Kemeja</option>
                        <option>🧢 Topi</option>
                        <option>🧥 Jaket</option>
                        <option>👟 Sepatu</option>
                    </select>
                </div>
                <div style="display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 12px;">
                    <select id="kondisi" style="flex:1; padding: 10px; border-radius: 12px; border:1px solid #e2e8f0;">
                        <option>Like New (90-100%)</option>
                        <option>Bekas Terawat (70-89%)</option>
                        <option>Fair (50-69%)</option>
                    </select>
                    <input type="number" id="harga" placeholder="Harga" required style="flex:1; padding: 10px; border-radius: 12px; border:1px solid #e2e8f0;">
                </div>
                <button type="submit" class="btn-primary"><i class="fas fa-save"></i> Simpan & Buat QR Code</button>
            </form>
        </div>

        <!-- Filter -->
        <div class="card filter-card">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Cari barang...">
            </div>
            <div class="filter-group">
                <select id="statusFilter">
                    <option value="all">Semua Status</option>
                    <option value="Tersedia">Tersedia</option>
                    <option value="Sold Out">Sold Out</option>
                </select>
                <select id="kategoriFilter">
                    <option value="all">Semua Kategori</option>
                </select>
                <button class="btn-primary" onclick="openScanner()" style="padding: 8px 16px;">
                    <i class="fas fa-camera"></i> Scan QR
                </button>
            </div>
        </div>

        <!-- Katalog -->
        <div class="catalog-header">
            <h2><i class="fas fa-boxes"></i> Daftar Barang + QR Code</h2>
            <span id="itemCount" class="badge">0 item</span>
        </div>
        <div id="catalogGrid" class="catalog-grid"></div>

        <footer>
            <p><i class="fas fa-qrcode"></i> Scan QR Code untuk cek stok barang</p>
        </footer>
    </div>

    <!-- Modal Scanner -->
    <div id="scanModal" class="modal">
        <div class="modal-content">
            <h3><i class="fas fa-qrcode"></i> Hasil Scan QR Code</h3>
            <p style="font-size: 0.8rem; color:#64748b;">Masukkan ID dari hasil scan:</p>
            <input type="text" id="scanInput" placeholder="Contoh: ITEM_xxx">
            <button onclick="checkScannedItem()" class="btn-primary" style="margin: 5px;">Cek Barang</button>
            <button onclick="closeScanner()" class="btn-close">Tutup</button>
        </div>
    </div>

    <script>
        // ==================== DATA BARANG (SUDAH TERISI QR CODE) ====================
        let items = [
            { 
                id: '1', 
                qrId: 'ITEM_KMEJA_FLANNEL_001',
                nama: 'Kemeja Flannel Uniqlo', 
                kategori: '👔 Kemeja', 
                kondisi: 'Like New (90-100%)', 
                harga: 125000, 
                foto: 'https://images.unsplash.com/photo-1598032895397-b9472444bf93?w=400',
                status: 'Tersedia' 
            },
            { 
                id: '2', 
                qrId: 'ITEM_TOPI_SNAPBACK_002',
                nama: 'Snapback Supreme', 
                kategori: '🧢 Topi', 
                kondisi: 'Like New (90-100%)', 
                harga: 85000, 
                foto: 'https://images.unsplash.com/photo-1588850561407-ed78c282e89b?w=400',
                status: 'Tersedia' 
            },
            { 
                id: '3', 
                qrId: 'ITEM_JAKET_LEVIS_003',
                nama: 'Jaket Levis Denim', 
                kategori: '🧥 Jaket', 
                kondisi: 'Bekas Terawat (70-89%)', 
                harga: 275000, 
                foto: 'https://images.unsplash.com/photo-1548126032-079a0fb009e9?w=400',
                status: 'Tersedia' 
            },
            { 
                id: '4', 
                qrId: 'ITEM_SEPATU_NIKE_004',
                nama: 'Sepatu Nike Air Max', 
                kategori: '👟 Sepatu', 
                kondisi: 'Bekas Terawat (70-89%)', 
                harga: 450000, 
                foto: 'https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400',
                status: 'Sold Out' 
            },
            { 
                id: '5', 
                qrId: 'ITEM_KEMEJA_OXFORD_005',
                nama: 'Kemeja Oxford H&M', 
                kategori: '👔 Kemeja', 
                kondisi: 'Like New (90-100%)', 
                harga: 150000, 
                foto: 'https://images.unsplash.com/photo-1596755094514-f87e34085b2c?w=400',
                status: 'Tersedia' 
            },
            { 
                id: '6', 
                qrId: 'ITEM_TOPI_BUCKET_006',
                nama: 'Bucket Hat Carhartt', 
                kategori: '🧢 Topi', 
                kondisi: 'Like New (90-100%)', 
                harga: 95000, 
                foto: 'https://images.unsplash.com/photo-1521369909029-2afed882baee?w=400',
                status: 'Tersedia' 
            },
            { 
                id: '7', 
                qrId: 'ITEM_JAKET_HOODIE_007',
                nama: 'Jaket Hoodie Champion', 
                kategori: '🧥 Jaket', 
                kondisi: 'Bekas Terawat (70-89%)', 
                harga: 195000, 
                foto: 'https://images.unsplash.com/photo-1556821840-3a63f95609a7?w=400',
                status: 'Tersedia' 
            },
            { 
                id: '8', 
                qrId: 'ITEM_SEPATU_VANS_008',
                nama: 'Sepatu Vans Old Skool', 
                kategori: '👟 Sepatu', 
                kondisi: 'Fair (50-69%)', 
                harga: 250000, 
                foto: 'https://images.unsplash.com/photo-1605348532760-6753d2c43329?w=400',
                status: 'Tersedia' 
            }
        ];

        const BASE_URL = window.location.href.split('?')[0];

        function getItemLink(qrId) {
            return `${BASE_URL}?item=${qrId}`;
        }

        function saveToLocal() {
            localStorage.setItem('preloved_qrcode_items', JSON.stringify(items));
        }

        function loadFromLocal() {
            const stored = localStorage.getItem('preloved_qrcode_items');
            if(stored) {
                items = JSON.parse(stored);
            } else {
                saveToLocal();
            }
        }

        function generateId() {
            return Date.now().toString(36);
        }

        function generateQrId(nama) {
            const clean = nama.replace(/[^a-zA-Z0-9]/g, '_').substring(0, 15);
            return `ITEM_${clean}_${generateId()}`;
        }

        // Tambah Barang
        document.getElementById('itemForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const nama = document.getElementById('nama').value.trim();
            const kategori = document.getElementById('kategori').value;
            const kondisi = document.getElementById('kondisi').value;
            const harga = parseInt(document.getElementById('harga').value);
            
            if(!nama || !kategori) return alert('Lengkapi data!');
            
            const newItem = {
                id: generateId(),
                qrId: generateQrId(nama),
                nama, kategori, kondisi, harga,
                foto: `https://placehold.co/400x300?text=${encodeURIComponent(nama)}`,
                status: 'Tersedia'
            };
            items.unshift(newItem);
            saveToLocal();
            renderKategoriFilter();
            renderCatalog();
            document.getElementById('itemForm').reset();
            alert(`✅ Barang ditambahkan!\nQR ID: ${newItem.qrId}`);
        });

        function renderKategoriFilter() {
            const katSet = new Set(items.map(i => i.kategori));
            const select = document.getElementById('kategoriFilter');
            const current = select.value;
            select.innerHTML = '<option value="all">Semua Kategori</option>';
            katSet.forEach(k => { if(k) { select.innerHTML += `<option value="${k}">${k}</option>` } });
            select.value = current;
        }

        function toggleStatus(id) {
            const item = items.find(i => i.id === id);
            if(item) {
                item.status = item.status === 'Tersedia' ? 'Sold Out' : 'Tersedia';
                saveToLocal();
                renderCatalog();
                alert(`Status "${item.nama}" → ${item.status}`);
            }
        }

        function deleteItem(id) {
            if(confirm('Hapus barang ini?')) {
                items = items.filter(i => i.id !== id);
                saveToLocal();
                renderKategoriFilter();
                renderCatalog();
            }
        }

        function renderQRCode(elementId, qrId) {
            const container = document.getElementById(elementId);
            if(!container) return;
            container.innerHTML = '';
            const link = getItemLink(qrId);
            new QRCode(container, {
                text: link,
                width: 100,
                height: 100,
                colorDark: "#0a2b5e",
                colorLight: "#ffffff"
            });
        }

        function downloadQR(elementId, nama) {
            const el = document.getElementById(elementId);
            if(!el) return;
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const qrImg = el.querySelector('img');
            if(qrImg) {
                canvas.width = qrImg.width;
                canvas.height = qrImg.height;
                ctx.drawImage(qrImg, 0, 0);
                const link = document.createElement('a');
                link.download = `QR_${nama.replace(/[^a-zA-Z0-9]/g, '_')}.png`;
                link.href = canvas.toDataURL();
                link.click();
                alert('QR Code downloaded!');
            } else {
                alert('Tunggu QR Code selesai dibuat');
            }
        }

        // Scan QR
        function openScanner() {
            document.getElementById('scanModal').style.display = 'flex';
            document.getElementById('scanInput').value = '';
        }

        function closeScanner() {
            document.getElementById('scanModal').style.display = 'none';
        }

        function checkScannedItem() {
            const scanned = document.getElementById('scanInput').value.trim();
            if(!scanned) return alert('Masukkan ID QR Code!');
            const item = items.find(i => i.qrId === scanned);
            if(item) {
                alert(`📦 BARANG DITEMUKAN!\n\nNama: ${item.nama}\nKategori: ${item.kategori}\nHarga: Rp ${item.harga.toLocaleString('id-ID')}\nStatus: ${item.status}\nKondisi: ${item.kondisi}`);
                closeScanner();
            } else {
                alert('❌ QR Code tidak valid! Barang tidak ditemukan.');
            }
        }

        function checkURL() {
            const params = new URLSearchParams(window.location.search);
            const itemParam = params.get('item');
            if(itemParam) {
                const item = items.find(i => i.qrId === itemParam);
                if(item) {
                    alert(`📱 QR CODE DISCANNED!\n\nBarang: ${item.nama}\nKategori: ${item.kategori}\nHarga: Rp ${item.harga.toLocaleString('id-ID')}\nStatus: ${item.status}\n\n${item.status === 'Tersedia' ? '✅ Barang TERSEDIA!' : '❌ Barang SUDAH SOLD OUT!'}`);
                } else {
                    alert('❌ QR Code tidak dikenal!');
                }
            }
        }

        function renderCatalog() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const statusFilter = document.getElementById('statusFilter').value;
            const katFilter = document.getElementById('kategoriFilter').value;
            
            let filtered = items.filter(item => {
                return item.nama.toLowerCase().includes(search) &&
                    (statusFilter === 'all' || item.status === statusFilter) &&
                    (katFilter === 'all' || item.kategori === katFilter);
            });
            
            document.getElementById('itemCount').innerText = `${filtered.length} item`;
            
            const container = document.getElementById('catalogGrid');
            if(filtered.length === 0) {
                container.innerHTML = `<div class="card" style="text-align:center;"><i class="fas fa-qrcode"></i><p>Tidak ada barang</p></div>`;
                return;
            }
            
            container.innerHTML = filtered.map(item => `
                <div class="item-card ${item.status === 'Sold Out' ? 'sold-out' : ''}">
                    <img class="item-img" src="${item.foto}" onerror="this.src='https://placehold.co/400x300?text=No+Image'">
                    <div class="item-info">
                        <div class="item-title">${item.nama}</div>
                        <div class="item-cat">${item.kategori} • ${item.kondisi}</div>
                        <div class="item-price">${item.harga.toLocaleString('id-ID')}</div>
                        <span class="status-${item.status === 'Tersedia' ? 'tersedia' : 'soldout'}">
                            ${item.status === 'Tersedia' ? '📌 Tersedia' : '❌ SOLD OUT'}
                        </span>
                        
                        <div class="qr-section">
                            <div id="qr_${item.id}" class="qr-placeholder"></div>
                            <button class="btn-qr" onclick="renderQRCode('qr_${item.id}', '${item.qrId}'); setTimeout(() => downloadQR('qr_${item.id}', '${item.nama}'), 500)">
                                <i class="fas fa-download"></i> Download QR
                            </button>
                            <div class="qr-id-text"><i class="fas fa-info-circle"></i> ${item.qrId}</div>
                        </div>
                        
                        <div class="card-actions">
                            <button class="btn-sold" onclick="toggleStatus('${item.id}')"><i class="fas fa-exchange-alt"></i> Ubah Status</button>
                            <button class="btn-delete" onclick="deleteItem('${item.id}')"><i class="fas fa-trash"></i> Hapus</button>
                        </div>
                    </div>
                </div>
            `).join('');
            
            items.forEach(item => {
                const el = document.getElementById(`qr_${item.id}`);
                if(el && el.innerHTML === '') {
                    const link = getItemLink(item.qrId);
                    new QRCode(el, { text: link, width: 100, height: 100, colorDark: "#0a2b5e", colorLight: "#ffffff" });
                }
            });
        }

        document.getElementById('searchInput').addEventListener('input', () => renderCatalog());
        document.getElementById('statusFilter').addEventListener('change', () => renderCatalog());
        document.getElementById('kategoriFilter').addEventListener('change', () => renderCatalog());

        loadFromLocal();
        renderKategoriFilter();
        renderCatalog();
        checkURL();
    </script>
</body>
</html>
